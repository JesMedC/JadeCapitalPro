# ─────────────────────────────────────────────────────────────
# JadeCapital v3 — Redis Configuration
# ─────────────────────────────────────────────────────────────

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec

# Connection limits
maxclients 500
timeout 300

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
